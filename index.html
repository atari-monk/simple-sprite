<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Sprite</title>
</head>

<body>
  <div class="app">
    <div class="controls">
      <input id="widthInput" type="number" placeholder="Width" value="256" />
      <input id="heightInput" type="number" placeholder="Height" value="256" />

      <select id="spriteSelect"></select>

      <button id="addBtn">Add Sprite</button>
      <button id="removeBtn">Remove Sprite</button>
      <button id="resetBtn">Reset</button>
      <button id="downloadBtn">Download</button>

      <div id="spriteList" class="list"></div>
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
